<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dice & Don't - Offline</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
        background: #0f0f12;
        color: #f5f5f5;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      .card {
        max-width: 520px;
        background: #1a1a20;
        border: 1px solid #2a2a33;
        border-radius: 16px;
        padding: 28px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        letter-spacing: 0.3px;
      }
      p {
        margin: 0 0 18px;
        color: #bdbdc7;
        line-height: 1.5;
      }
      button {
        appearance: none;
        border: 1px solid #3a3a46;
        background: #262632;
        color: #fff;
        padding: 10px 18px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #2e2e3a; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Connessione assente</h1>
      <p>Il sito non è raggiungibile in questo momento. Verifica la connessione e riprova.</p>
      <button type="button" onclick="location.reload()">Riprova</button>
    </div>
  </body>
</html>
